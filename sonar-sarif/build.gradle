plugins {
  id "org.jsonschema2pojo" version "1.3.3"
}

dependencies {
  api 'com.fasterxml.jackson.core:jackson-databind'
  api 'com.google.code.findbugs:jsr305'
}

jsonSchema2Pojo {
  source = files("${sourceSets.main.output.resourcesDir}/sarif/sarif-schema-2.1.0.json")
  generateBuilders = true
  inclusionLevel = "NON_DEFAULT"
  initializeCollections = false
  targetPackage = 'org.sonar.sarif.pojo'
  includeJsr305Annotations = true
}

afterEvaluate {
  spotless {
    java {
      targetExclude 'src/main/java/org/sonar/sarif/pojo/**', 'build/**'
    }
  }
}

tasks.matching { it.name.startsWith('spotless') }.configureEach { spotlessTask ->
  spotlessTask.mustRunAfter(tasks.named("generateJsonSchema2Pojo"))
}

// Produce Java 17 bytecode while making sure the code does not use any APIs from Java 21
tasks.withType(JavaCompile).configureEach {
  options.release = 17
}
