//verify if sonar.properties files does not have any external input
task verifySonarProperties(type: Verify) {
  def propertiesFile = file('src/main/assembly/conf/sonar.properties')
  propertiesFile.withReader { reader ->
    def line
    while ((line = reader.readLine()) != null) {
      if (!line.startsWith('#') && !line.isEmpty()) {
        throw new GradleException('sonar.properties file by default must not provide any user configuration.')
      }
    }
  }
}


tasks.register('generateLicenseReport', WriteDependencyLicensesTask) {
  configurationName = 'appLicenses'
  outputDir = layout.buildDirectory.dir('reports/dependency-license')
}

tasks.register('downloadJres') {
  inputs.file(layout.projectDirectory.dir('src/main/resources/jres-metadata.json').asFile).withPathSensitivity(PathSensitivity.RELATIVE)
  outputs.dir(layout.buildDirectory.file('jres'))
  outputs.cacheIf { true }

  doFirst {
    // Clean the output directory before downloading so stale JREs from previous versions don't accumulate.
    def jresDir = layout.buildDirectory.dir('jres').get().asFile
    if (jresDir.exists()) {
      jresDir.listFiles()?.each {
        if (!it.delete()) {
          logger.warn("Failed to delete stale JRE file: ${it}")
        }
      }
    }
  }

  doLast {
    def jresMetadata = new JsonSlurper().parse(file(layout.projectDirectory.dir('src/main/resources/jres-metadata.json').asFile))
    def expectedFilenames = jresMetadata.collect { it.filename } as Set
    delete fileTree(layout.buildDirectory.dir('jres')) {
      exclude expectedFilenames
    }
    jresMetadata.each { jre ->
      downloadJreFromAdoptium(jre.os, jre.arch, jre.filename, jre.sha256)
    }
  }
}


def elasticSearchArtifactoryUsername() {
  System.env.'ARTIFACTORY_USERNAME' ?: (project.hasProperty('artifactoryUsername') ? project.getProperty('artifactoryUsername') : '')
}

def elasticSearchArtifactoryPassword() {
  System.env.'ARTIFACTORY_ACCESS_TOKEN' ?: (project.hasProperty('artifactoryPassword') ? project.getProperty('artifactoryPassword') : '')
}

/** Local + remote archive basename; variant differs for Repox no-jdk vs public Elastic linux-x86_64. */
def elasticSearchArchiveName() {
  def version = elasticSearchServerVersion as String
  return (elasticSearchArtifactoryUsername() && elasticSearchArtifactoryPassword())
    ? "elasticsearch-${version}-no-jdk.tar.gz"
    : "elasticsearch-${version}-linux-x86_64.tar.gz"
}

tasks.register('downloadElasticsearch') {
  def artifactoryPassword = elasticSearchArtifactoryPassword()
  def useArtifactory = elasticSearchArtifactoryUsername() && artifactoryPassword
  def artifactoryUrl = System.getenv('ARTIFACTORY_URL') ?: (project.hasProperty('artifactoryUrl') ? project.getProperty('artifactoryUrl') : 'https://repox.jfrog.io/repox')
  def archiveName = elasticSearchArchiveName()
  def destFile = layout.buildDirectory.file("elasticsearch-dist/${archiveName}")
  def srcUrl = useArtifactory
    ? "${artifactoryUrl}/sonarsource-bucket/sonarqube/elasticsearch/${archiveName}"
    : "https://artifacts.elastic.co/downloads/elasticsearch/${archiveName}"
  def checksumAlgorithm = useArtifactory ? 'SHA-256' : 'SHA-512'
  def expectedChecksum = useArtifactory ? elasticSearchNoJdkSha256 : elasticSearchLinuxSha512

  inputs.property('elasticSearchArchiveName', archiveName)
  inputs.property('elasticSearchChecksum', expectedChecksum)
  // Do not declare outputs.file / cacheIf: on a fresh CI runner the task is out-of-date, and
  // Gradle deletes declared outputs before doLast — wiping a GHA-restored tarball and forcing
  // a Repox re-download despite overwrite false. GHA owns caching of elasticsearch-dist/.

  doLast {
    def archiveFile = destFile.get().asFile
    archiveFile.parentFile.mkdirs()
    if (!archiveFile.exists()) {
      download.run {
        src srcUrl
        dest archiveFile
        if (useArtifactory) {
          header 'Authorization', "Bearer ${artifactoryPassword}"
        }
        overwrite true
      }
    } else {
      logger.lifecycle("Using existing Elasticsearch archive ${archiveFile}")
    }
    verifyChecksum.run {
      src archiveFile
      algorithm checksumAlgorithm
      checksum expectedChecksum
    }
  }
}

task zip(type: Zip, dependsOn: [configurations.compileClasspath]) {
  duplicatesStrategy DuplicatesStrategy.EXCLUDE
  def archiveDir = "sonarqube-$project.version"

  dependsOn tasks.downloadJres
  into("${archiveDir}/jres") {
    from(layout.buildDirectory.dir('jres'))
  }

  if(release) {
    dependsOn tasks.generateLicenseReport
    into("${archiveDir}/licenses/") {
      from(tasks.generateLicenseReport.outputs) {
        include 'dependency-license.json'
        filter(LicenseReader)
      }
    }
  }

  into("${archiveDir}/") {
    from(file('src/main/assembly')) {
      exclude 'conf/sonar.properties'
      exclude 'bin/windows-x86-64/lib/SonarServiceWrapperTemplate.xml'
      exclude 'bin/windows-x86-64/StartSonar.bat'
      exclude 'bin/linux-x86-64/sonar.sh'
      exclude 'bin/macosx-universal-64/sonar.sh'
      exclude 'security/report-metadata.json'
      rename { fileName ->
        if (fileName == 'CVE-review-and-treatment-status-sqcb.csv') {
          return "CVE-review-and-treatment-status-sqcb-${version}.csv"
        } else if (fileName == 'CVE-review-and-treatment-status-sqcb.json') {
          return "CVE-review-and-treatment-status-sqcb-${version}.json"
        }
        return fileName
