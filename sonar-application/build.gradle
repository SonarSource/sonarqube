// Check the size of the archive
zip {
  mustRunAfter cyclonedxBom
  doLast {
    // Check for stale JREs: the jres directory should contain exactly as many files as jres-metadata.json.
    // Extra files from a previous JRE version inflate the zip and can cause the size check below to fail.
    // Fix: run './gradlew clean' to remove stale JREs, then rebuild.
    // Match files by name against metadata instead of raw count to tolerate unrelated entries (.DS_Store, partial downloads, etc.)
    def jresDir = layout.buildDirectory.dir('jres').get().asFile
    def jresMetadata = new JsonSlurper().parse(file(layout.projectDirectory.dir('src/main/resources/jres-metadata.json').asFile))
    def expectedNames = jresMetadata.collect { it.filename } as Set
    def actualNames = (jresDir.listFiles()?.collect { it.name } ?: []) as Set
    def missing = expectedNames - actualNames
    def extra = actualNames - expectedNames
    if (missing || extra) {
      def message =
        "JRE files in ${jresDir} do not match jres-metadata.json (missing: ${missing}, unexpected: ${extra}). " +
          "Run './gradlew clean' to remove stale JREs, then rebuild."
      // Strict in CI; warn locally so leftover .DS_Store / partial downloads don't abort local builds.
      if (System.getenv("CI") == "true") {
        throw new GradleException(message)
      }
      logger.warn(message)
    }

    // When the archive size increases due to dependencies, the expected size should be updated as well.
    // Unknown failures may cause the archive size to shrink accidentally in size.
    //
    // This check is in place as a protection so that the developer checks why the size increased or decreased
    // out of this expected area.
    //
    // If the change is expected, modify the expectedSize to be whatever the archiveSize is rounded down to the nearest 10MB.
    // The calculation below will also tell you the number you should use here.
    // If this is not expected, try performing a Gradle clean and refreshing dependencies.
    def expectedSize = 930_000_000
    // We set a tolerance to avoid failing the build for small differences in the archive size.
    def tolerance = 15_000_000
    def minArchiveSize = expectedSize - tolerance
    def maxArchiveSize = expectedSize + tolerance

    def archiveSize = archiveFile.get().asFile.length()
    def newExpectedSize = ((int)(archiveSize / 10_000_000)) * 10_000_000
    // When building with local snapshot artifacts (useLocalSca, useLocalArchitecture, etc.) the archive
    // will be larger than a published build because snapshot JARs include test classes and debug info.
    // Skip the upper-bound check in that case to avoid spurious failures during local development.
    def usingLocalArtifacts = ['useLocalSca', 'useLocalArchitecture', 'useLocalMetrics', 'useLocalOrg'].any {
      project.hasProperty(it) && project.property(it) == 'true'
    }
    if (archiveSize < minArchiveSize && System.getenv("CI") == "true")
      throw new GradleException("${destinationDirectory.get()}/${archiveFileName.get()} size ($archiveSize) too small. Min is $minArchiveSize. If this is expected, update `expectedSize` to ${newExpectedSize} in sonar-application/build.gradle.")
    if (archiveSize > maxArchiveSize && (!usingLocalArtifacts || System.getenv("CI") == "true"))
      throw new GradleException("${destinationDirectory.get()}/${archiveFileName.get()} size ($archiveSize) too large. Max is $maxArchiveSize. If this is expected, update `expectedSize` to ${newExpectedSize} in sonar-application/build.gradle.")
  }
}
assemble.dependsOn zip

// the script start.sh unpacks OSS distribution into $buildDir/distributions/sonarqube-oss.
// This directory should be deleted when the zip is changed.
task cleanLocalUnzippedDir(dependsOn: zip) {
  def unzippedDir = file("$buildDir/distributions/sonarqube-$version")
  inputs.files(file("$buildDir/distributions/sonar-application-${version}.zip"))
  outputs.upToDateWhen { true }
  outputs.cacheIf('Caching has not been enabled for the task.') { false }

  doLast {
    println("delete directory ${unzippedDir}")
    project.delete(unzippedDir)
  }
}
assemble.dependsOn cleanLocalUnzippedDir

